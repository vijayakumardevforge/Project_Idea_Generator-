spring.application.name=Project Idea Generator
server.port=8080

# Import local secrets (ignored by Git)
spring.config.import=optional:file:./application-secrets.properties

# PostgreSQL Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aiprojects}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hugging Face Configuration
huggingface.api.url=https://router.huggingface.co/v1/chat/completions
huggingface.api.token.idea=${HUGGINGFACE_API_TOKEN_IDEA:${HUGGINGFACE_API_TOKEN}}
huggingface.api.token.roadmap=${HUGGINGFACE_API_TOKEN_ROADMAP:${HUGGINGFACE_API_TOKEN}}

# Redis Configuration
spring.data.redis.url=${REDIS_URL}
